version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tiumnichka_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tium_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    container_name: tiumnichka_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_CREDENTIALS_OVERRIDE=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - LOG_PATH=/app/logs
      - YANDEX_BINARY_PATH=/app/uploader_script/binary
    volumes:
      - ./logs:/app/logs
      - ./uploader_script:/app/uploader_script:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tium_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  tium_network:
    driver: bridge