# ALEMBIC CONFIGURATION — TIUMNICHKA BOT
# ============================================================

[alembic]
# Путь к папке с миграциями (относительно запуска)
script_location = database/migration

# Добавляем корень проекта в sys.path для импорта моделей
prepend_sys_path = .

# Шаблон имени файла миграции: YYYYMMDD_revision_slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Кроссплатформенный разделитель путей
version_path_separator = os

# ⚠️ URL будет задан программно в env.py через os.environ
# Это заглушка для статического анализа инструментов
sqlalchemy.url = postgresql://placeholder:placeholder@localhost/placeholder

# Кодировка файлов миграций
output_encoding = utf-8

# Обрезать slug до 40 символов в имени файла
truncate_slug_length = 40

# Не создавать пустые комментарии в миграциях
# (опционально, можно включить для документации)
# exclude_tables = 

[post_write_hooks]
# Пример: автоформатирование через black (раскомментируй при необходимости)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# ============================================================
# LOGGING
# ============================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S